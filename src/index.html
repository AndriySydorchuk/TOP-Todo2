<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>

<body>

    <main class="main">

        <section class="projects-view">

            <div class="top-container">
                <button class="new-project-btn">New Project</button>
            </div>

            <div class="projects-grid">
            </div>

        </section>

        <section class="todos-view hidden">
            <p class="todos-title">
                <!-- TODO project name -->
                Project 1
            </p>
            <div class="todos-container">
                <div class="todo-card">
                    <p class="todo-title">
                        <!-- todo title -->
                        Task 1 title
                    </p>
                </div>
                <div class="todo-card">
                    <p class="todo-title">
                        <!-- todo title -->
                        Task 2 title
                    </p>
                </div>
                <div class="todo-card">
                    <p class="todo-title">
                        <!-- todo title -->
                        Task 3 title
                    </p>
                </div>
            </div>
        </section>

    </main>

</body>

</html>
