<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>

<body>

    <main class="main">

        <section class="projects-view">

            <div class="top-container">
                <button class="new-project-btn">New Project</button>
            </div>

            <div class="projects-grid">
            </div>

        </section>

        <section class="todos-view hidden">
            <div class="todos-header">
                <p class="todos-title"></p>
                <div class="todos-header-actions">
                    <button class="edit-project-btn">
                        Edit
                    </button>
                    <button class="delete-project-btn">Delete</button>
                </div>
            </div>
            <div class="todos-container">
            </div>

            <div class="actions">
                <button class="new-todo-btn">New Todo</button>
                <button class="back-btn">Back</button>
            </div>
        </section>

    </main>

</body>

</html>
